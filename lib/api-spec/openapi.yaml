openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: task
    description: Task management operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /pick-person:
    get:
      operationId: pickPerson
      tags: [task]
      summary: Pick a random person for a management task
      description: Returns the person selected to handle the management task
      responses:
        "200":
          description: Person selected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PickedPerson"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    PickedPerson:
      type: object
      properties:
        name:
          type: string
        emojis:
          type: string
      required:
        - name
        - emojis
